open-administration-map:
  api-key: thisistemporaryapikey

kakao:
  api-key: thisistemporaryapikey

s3:
  bucket: s3bucket
  region: region
  access-key: accesskey
  secret-key: secretkey
  presigned-url-expiration-time: 1000

weatherfit:
  storage:
    type: s3

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/weatherfit_test
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  elasticsearch:
    uris: http://localhost:9200
  batch:
    job:
      enabled: false
  ai:
    openai:
      api-key: temporaryapikey
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: nvidia/nemotron-3-super-120b-a12b:free
  kafka:
    bootstrap-servers: localhost:9092