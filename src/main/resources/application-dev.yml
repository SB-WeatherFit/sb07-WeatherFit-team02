spring:
  datasource:
    url: jdbc:h2:mem:weatherfit
    username: sa
    driver-class-name: org.h2.Driver
  cache:
    type: redis
    cache-name:
      - weathers
    redis:
      enable-statistics: true
      time-to-live: 6000  #ttl 10분
      cache-null-values: false
  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug