spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/weatherFit
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  cache:
    type: redis
    cache-name:
      - weathers
    redis:
      enable-statistics: true
      time-to-live: 6000  #ttl 10분
      cache-null-values: false
  data:
    redis:
      host: localhost
      port: 6379



  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug