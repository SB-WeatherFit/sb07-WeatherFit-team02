spring:
  application:
    name: WeatherFit
  profiles:
    default: dev
  batch:
    job:
      enabled: false
  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY:}
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: nvidia/nemotron-3-super-120b-a12b:free
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false





  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:test-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:test-client-secret}
            scope:
              - email
              - profile
              - openid
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          kakao:
            client-id: ${KAKAO_REST_API_KEY:test-kakao-client-id}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Kakao
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

open-administration-map:
  api-key: ${WEATHER_ADMINISTRATION_API_KEY:}

kakao:
  api-key: ${KAKAO_API_KEY:}

s3:
  bucket: ${AWS_S3_BUCKET:}
  region: ${AWS_S3_REGION:}
  access-key: ${AWS_S3_ACCESS_KEY:}
  secret-key: ${AWS_S3_SECRET_KEY:}
  presigned-url-expiration-time: ${AWS_S3_PRESIGNED_URL_EXPIRATION:1000}

weatherfit:
  storage:
    type: ${STORAGE_TYPE:s3}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
  auth:
    temporary-password-expiration-seconds: ${TEMPORARY_PASSWORD_EXPIRATION_SECONDS:180}
    social:
      success-redirect-uri: ${SOCIAL_LOGIN_SUCCESS_REDIRECT_URI:http://localhost:8080/index.html}
  default-user-id: ${DEFAULT_USER_ID:}

info:
  app:
    name: weatherfit
    description: weather and clothes recommendation application
    version: 1.0.0
    encoding: UTF-8
    java-version: 21
    company:
      name: SB07-team02
      email: genius5375@gmail.com

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  info:
    env:
      enabled: true